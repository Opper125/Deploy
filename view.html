<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Site...</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            z-index: 9999;
        }

        .loading-container.hidden {
            display: none;
        }

        .loader-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .loader-text {
            font-size: 18px;
            color: #a0a0b8;
            margin-bottom: 10px;
        }

        .loader-domain {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: #1a1a28;
            border-radius: 4px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loader-fill {
            width: 30%;
            height: 100%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 4px;
            animation: loading 1.5s ease infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .error-message {
            color: #a0a0b8;
            font-size: 16px;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(108,92,231,0.4);
        }

        /* Site frame */
        #siteFrame {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        /* Toolbar */
        .preview-toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 22, 31, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a3a;
            border-radius: 50px;
            padding: 8px 16px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .preview-toolbar.show {
            display: flex;
        }

        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #a0a0b8;
        }

        .toolbar-badge {
            padding: 4px 10px;
            background: linear-gradient(135deg, #00b894, #00ff88);
            color: #000;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .toolbar-domain {
            color: #fff;
            font-weight: 600;
        }

        .toolbar-btn {
            padding: 6px 12px;
            background: #2a2a3a;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toolbar-btn:hover {
            background: #3a3a4a;
        }

        .toolbar-close {
            padding: 6px 10px;
            background: none;
            border: none;
            color: #6a6a80;
            cursor: pointer;
            font-size: 14px;
        }

        .toolbar-close:hover {
            color: #ff4757;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-container" id="loadingContainer">
        <div class="loader-icon">🌐</div>
        <div class="loader-text">Loading website...</div>
        <div class="loader-domain" id="loadingDomain">-</div>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <!-- Error Screen -->
    <div class="error-container" id="errorContainer">
        <div class="error-icon">😕</div>
        <div class="error-title" id="errorTitle">Site Not Found</div>
        <div class="error-message" id="errorMessage">
            The requested website could not be found or may have been removed.
        </div>
        <a href="index.html" class="btn">
            <span>←</span> Back to DeployHub
        </a>
    </div>

    <!-- Site Frame -->
    <iframe id="siteFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <!-- Preview Toolbar -->
    <div class="preview-toolbar" id="previewToolbar">
        <span class="toolbar-badge">🚀 LIVE</span>
        <span class="toolbar-item">
            <span>🌐</span>
            <span class="toolbar-domain" id="toolbarDomain">-</span>
        </span>
        <button class="toolbar-btn" onclick="openInNewTab()">
            ↗ New Tab
        </button>
        <button class="toolbar-btn" onclick="copyUrl()">
            📋 Copy URL
        </button>
        <a href="index.html#dashboard" class="toolbar-btn">
            ← Dashboard
        </a>
        <button class="toolbar-close" onclick="hideToolbar()">✕</button>
    </div>

    <script>
        // ============================================
        // DeployHub Site Viewer
        // ============================================

        const CONFIG = {
            JSONBIN_BASE_URL: 'https://api.jsonbin.io/v3',
            JSONBIN_MASTER_KEY: '$2a$10$knLbj34a5Xd8aQPpcbew2OzzgLNxz6h65F7Q2TPaPjSXD2p1yC4Wi'
        };

        let currentProject = null;
        let currentSiteContent = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSite();
        });

        // Load site from URL parameters
        async function loadSite() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id') || params.get('project');
            const domain = params.get('domain') || params.get('site');

            if (!projectId && !domain) {
                showError('No Site Specified', 'Please provide a project ID or domain name.');
                return;
            }

            // Show loading
            const loadingDomain = document.getElementById('loadingDomain');
            loadingDomain.textContent = domain || projectId;

            try {
                // Try to load from localStorage first
                const project = await findProject(projectId, domain);

                if (!project) {
                    showError('Site Not Found', 'This website does not exist or has been removed.');
                    return;
                }

                currentProject = project;

                // Update page title
                document.title = project.name + ' | DeployHub';
                document.getElementById('toolbarDomain').textContent = project.domain || project.name;

                // Load site content
                if (project.siteContent) {
                    renderSite(project.siteContent);
                } else if (project.repository && project.repository.fullName) {
                    // Fetch from GitHub
                    const content = await fetchGitHubContent(project);
                    if (content) {
                        renderSite(content);
                    } else {
                        showError('Content Not Available', 'Could not load website content from GitHub.');
                    }
                } else {
                    // Generate demo page
                    renderDemoSite(project);
                }

            } catch (error) {
                console.error('Load site error:', error);
                showError('Loading Error', 'An error occurred while loading the website.');
            }
        }

        // Find project by ID or domain
        async function findProject(projectId, domain) {
            // Check all users' projects in localStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('dh_projects_')) {
                    try {
                        const encoded = localStorage.getItem(key);
                        const json = decodeURIComponent(atob(encoded));
                        const projects = JSON.parse(json);

                        if (Array.isArray(projects)) {
                            const found = projects.find(p => {
                                if (projectId && p.id === projectId) return true;
                                if (domain && p.domain) {
                                    const cleanDomain = domain.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '');
                                    const projDomain = p.domain.toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '');
                                    return cleanDomain === projDomain;
                                }
                                return false;
                            });

                            if (found && found.status !== 'deleted') {
                                return found;
                            }
                        }
                    } catch (e) {
                        continue;
                    }
                }
            }

            // Also check non-encoded format
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.includes('projects')) {
                    try {
                        const data = localStorage.getItem(key);
                        const projects = JSON.parse(data);
                        if (Array.isArray(projects)) {
                            const found = projects.find(p => {
                                if (projectId && p.id === projectId) return true;
                                if (domain && p.domain && p.domain.includes(domain)) return true;
                                return false;
                            });
                            if (found) return found;
                        }
                    } catch (e) {
                        continue;
                    }
                }
            }

            return null;
        }

        // Fetch content from GitHub
        async function fetchGitHubContent(project) {
            // Check for stored GitHub token
            let ghToken = '';
            
            // Try to find user's GitHub token
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('dh_users')) {
                    try {
                        const encoded = localStorage.getItem(key);
                        const json = decodeURIComponent(atob(encoded));
                        const users = JSON.parse(json);
                        if (Array.isArray(users)) {
                            const user = users.find(u => u.id === project.userId);
                            if (user && user.githubToken) {
                                ghToken = user.githubToken;
                                break;
                            }
                        }
                    } catch (e) {
                        continue;
                    }
                }
            }

            if (!ghToken) {
                console.log('No GitHub token found');
                return null;
            }

            try {
                const repoFullName = project.repository.fullName;
                const branch = project.repository.branch || 'main';

                // Fetch index.html
                const response = await fetch(
                    `https://api.github.com/repos/${repoFullName}/contents/index.html?ref=${branch}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${ghToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (!response.ok) {
                    // Try README.md as fallback
                    return await fetchReadme(repoFullName, branch, ghToken);
                }

                const data = await response.json();
                if (data.content) {
                    let html = atob(data.content.replace(/\n/g, ''));
                    
                    // Inject security script if enabled
                    if (project.security) {
                        html = injectSecurityScript(html, project.security);
                    }

                    return html;
                }

                return null;

            } catch (error) {
                console.error('GitHub fetch error:', error);
                return null;
            }
        }

        // Fetch README as fallback
        async function fetchReadme(repoFullName, branch, ghToken) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${repoFullName}/readme?ref=${branch}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${ghToken}`,
                            'Accept': 'application/vnd.github.v3.html'
                        }
                    }
                );

                if (response.ok) {
                    const html = await response.text();
                    return wrapInHTML(html, 'README');
                }

                return null;
            } catch (e) {
                return null;
            }
        }

        // Wrap content in HTML template
        function wrapInHTML(content, title) {
            return `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 40px;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1, h2, h3 { color: #fff; margin: 20px 0 10px; }
        p { margin: 10px 0; }
        a { color: #58a6ff; }
        code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
        pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; }
        img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        ${content}
    </div>
</body>
</html>`;
        }

        // Render demo site
        function renderDemoSite(project) {
            const html = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${project.name} - Deployed on DeployHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .success-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            color: #00ff88;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .success-badge::before {
            content: '✓';
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .gradient {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #74b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .domain {
            font-size: 24px;
            color: #a29bfe;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .domain::before {
            content: '🌐 ';
        }

        .info {
            color: #a0a0b8;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            color: #6a6a80;
            margin-top: 4px;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .feature {
            padding: 6px 14px;
            background: rgba(108, 92, 231, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: #a29bfe;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5);
        }

        .footer {
            margin-top: 50px;
            color: #4a4a60;
            font-size: 13px;
        }

        .footer a {
            color: #6c5ce7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-badge">Successfully Deployed</div>
        
        <h1><span class="gradient">${project.name}</span></h1>
        
        <div class="domain">${project.domain || 'No domain set'}</div>
        
        <p class="info">
            Your website has been successfully deployed on DeployHub!<br>
            This is a preview page. Replace your repository's index.html with your actual website content.
        </p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value">✓</div>
                <div class="stat-label">SSL Active</div>
            </div>
            <div class="stat">
                <div class="stat-value">✓</div>
                <div class="stat-label">CDN Enabled</div>
            </div>
            <div class="stat">
                <div class="stat-value">✓</div>
                <div class="stat-label">Security On</div>
            </div>
        </div>

        <div class="features">
            <span class="feature">🔒 HTTPS</span>
            <span class="feature">🛡️ DDoS Protection</span>
            <span class="feature">⚡ Fast CDN</span>
            <span class="feature">🔐 Security Headers</span>
        </div>

        <a href="${project.repository?.url || '#'}" target="_blank" class="btn">
            View Repository →
        </a>

        <div class="footer">
            Powered by <a href="index.html">DeployHub</a> 🚀
        </div>
    </div>
</body>
</html>`;

            renderSite(html);
        }

        // Inject security script
        function injectSecurityScript(html, security) {
            if (!security) return html;

            let script = '<script>';
            
            if (security.rightClickProtection) {
                script += `document.addEventListener('contextmenu',function(e){e.preventDefault();});`;
            }
            
            if (security.copyProtection) {
                script += `document.addEventListener('copy',function(e){e.preventDefault();});`;
                script += `document.addEventListener('selectstart',function(e){e.preventDefault();});`;
            }
            
            if (security.devToolsProtection) {
                script += `document.addEventListener('keydown',function(e){if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&e.keyCode===73)||(e.ctrlKey&&e.keyCode===85)){e.preventDefault();}});`;
            }

            script += '<\/script>';

            // Inject before </body>
            if (html.includes('</body>')) {
                return html.replace('</body>', script + '</body>');
            } else {
                return html + script;
            }
        }

        // Render site in iframe
        function renderSite(htmlContent) {
            const loadingContainer = document.getElementById('loadingContainer');
            const siteFrame = document.getElementById('siteFrame');
            const toolbar = document.getElementById('previewToolbar');

            // Hide loading
            loadingContainer.classList.add('hidden');

            // Show iframe
            siteFrame.style.display = 'block';

            // Write content to iframe
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            siteFrame.src = url;

            // Store content
            currentSiteContent = htmlContent;

            // Show toolbar after delay
            setTimeout(() => {
                toolbar.classList.add('show');
            }, 1000);
        }

        // Show error
        function showError(title, message) {
            const loadingContainer = document.getElementById('loadingContainer');
            const errorContainer = document.getElementById('errorContainer');

            loadingContainer.classList.add('hidden');
            errorContainer.style.display = 'flex';
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorMessage').textContent = message;
        }

        // Toolbar actions
        function openInNewTab() {
            if (currentSiteContent) {
                const blob = new Blob([currentSiteContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
            }
        }

        function copyUrl() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
        }

        function hideToolbar() {
            document.getElementById('previewToolbar').classList.remove('show');
        }
    </script>
</body>
</html>
